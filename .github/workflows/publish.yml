name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require npm with OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Build sigql library
        run: pnpm run build:lib

      - name: Run tests
        run: pnpm run test

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./dist/sigql/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match sigql package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        working-directory: dist/sigql
        run: npm publish --provenance
